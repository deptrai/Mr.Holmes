<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mr.Holmes OSINT Mindmap — admin@facebook.com</title>
  <script type="text/javascript"
    src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js">
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0; padding: 0;
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    #header {
      padding: 14px 20px;
      background: linear-gradient(135deg, #161b22 0%, #21262d 100%);
      border-bottom: 1px solid #30363d;
      display: flex; align-items: center; gap: 10px;
    }
    #header h1 {
      margin: 0; font-size: 1.1rem; font-weight: 600;
      color: #f0883e;
      flex: 1;
    }
    #header span {
      font-size: 0.75rem; color: #8b949e;
    }
    #controls {
      padding: 8px 20px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    }
    #controls button {
      background: #21262d; border: 1px solid #30363d; color: #c9d1d9;
      padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem;
      transition: background 0.2s;
    }
    #controls button:hover { background: #30363d; }
    #legend {
      display: flex; gap: 12px; flex-wrap: wrap; margin-left: auto;
    }
    #legend .litem {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.72rem; color: #8b949e;
    }
    #legend .dot {
      width: 10px; height: 10px; border-radius: 50%;
      display: inline-block; flex-shrink: 0;
    }
    #network-container {
      width: 100%; height: calc(100vh - 100px);
    }
    #stats {
      position: fixed; bottom: 10px; right: 14px;
      background: rgba(22,27,34,0.9);
      border: 1px solid #30363d; border-radius: 8px;
      padding: 8px 14px; font-size: 0.75rem; color: #8b949e;
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>🔍 Mr.Holmes OSINT Mindmap — admin@facebook.com</h1>
    <span>Được tạo lúc: 2026-03-30 18:28 UTC</span>
  </div>

  <div id="controls">
    <button onclick="network.fit()">⛶ Fit tất cả</button>
    <button onclick="network.setOptions({physics:{enabled:true}})">▶ Bật Physics</button>
    <button onclick="network.setOptions({physics:{enabled:false}})">⏸ Tắt Physics</button>
    <div id="legend">
      <div class="litem"><span class="dot" style="background:#c0392b"></span>Seed (Depth 0)</div>
      <div class="litem"><span class="dot" style="background:#e67e22"></span>Depth 1</div>
      <div class="litem"><span class="dot" style="background:#f1c40f"></span>Depth 2</div>
      <div class="litem"><span class="dot" style="background:#e74c3c"></span>EMAIL</div>
      <div class="litem"><span class="dot" style="background:#9b59b6"></span>USERNAME</div>
      <div class="litem"><span class="dot" style="background:#2980b9"></span>IP</div>
      <div class="litem"><span class="dot" style="background:#27ae60"></span>DOMAIN</div>
    </div>
  </div>

  <div id="network-container"></div>
  <div id="stats">
    Nodes: <b id="node-count">0</b> | Edges: <b id="edge-count">0</b>
  </div>

  <script type="text/javascript">
    // ── embedded graph data (generated by Mr.Holmes) ──────────────────────────
    var RAW_NODES = [{"id": "admin@facebook.com", "label": "admin@facebook.com", "title": "EMAIL: admin@facebook.com (depth 0)", "color": {"background": "#c0392b", "border": "#ffffff", "highlight": {"background": "#c0392b", "border": "#f0883e"}, "hover": {"background": "#c0392b", "border": "#58a6ff"}}, "shape": "star", "size": 30, "font": {"color": "#ffffff", "size": 13, "bold": true}}, {"id": "157.240.221.35", "label": "157.240.221.35", "title": "IP: 157.240.221.35 (depth 1)", "color": {"background": "#2980b9", "border": "#ffffff", "highlight": {"background": "#2980b9", "border": "#f0883e"}, "hover": {"background": "#2980b9", "border": "#58a6ff"}}, "shape": "diamond", "size": 24, "font": {"color": "#ffffff", "size": 11, "bold": false}}, {"id": "facebook.com", "label": "facebook.com", "title": "DOMAIN: facebook.com (depth 1)", "color": {"background": "#27ae60", "border": "#ffffff", "highlight": {"background": "#27ae60", "border": "#f0883e"}, "hover": {"background": "#27ae60", "border": "#58a6ff"}}, "shape": "box", "size": 24, "font": {"color": "#ffffff", "size": 11, "bold": false}}, {"id": "deptraidapxichlo", "label": "deptraidapxichlo", "title": "USERNAME: deptraidapxichlo (depth 1)", "color": {"background": "#9b59b6", "border": "#ffffff", "highlight": {"background": "#9b59b6", "border": "#f0883e"}, "hover": {"background": "#9b59b6", "border": "#58a6ff"}}, "shape": "ellipse", "size": 24, "font": {"color": "#ffffff", "size": 11, "bold": false}}, {"id": "31.13.72.36", "label": "31.13.72.36", "title": "IP: 31.13.72.36 (depth 1)", "color": {"background": "#2980b9", "border": "#ffffff", "highlight": {"background": "#2980b9", "border": "#f0883e"}, "hover": {"background": "#2980b9", "border": "#58a6ff"}}, "shape": "diamond", "size": 24, "font": {"color": "#ffffff", "size": 11, "bold": false}}];
    var RAW_EDGES = [{"id": 0, "from": "admin@facebook.com", "to": "157.240.221.35", "label": "Shodan", "title": "Discovered by: Shodan", "dashes": false, "width": 1.5}, {"id": 1, "from": "admin@facebook.com", "to": "facebook.com", "label": "SearxngOSINT", "title": "Discovered by: SearxngOSINT", "dashes": false, "width": 1.5}, {"id": 2, "from": "admin@facebook.com", "to": "deptraidapxichlo", "label": "LeakLookup", "title": "Discovered by: LeakLookup", "dashes": false, "width": 1.5}, {"id": 3, "from": "facebook.com", "to": "31.13.72.36", "label": "Shodan", "title": "Discovered by: Shodan", "dashes": false, "width": 1.5}];

    // ── build vis DataSets ────────────────────────────────────────────────────
    var nodes = new vis.DataSet(RAW_NODES);
    var edges = new vis.DataSet(RAW_EDGES);

    document.getElementById("node-count").textContent = RAW_NODES.length;
    document.getElementById("edge-count").textContent = RAW_EDGES.length;

    // ── network options ───────────────────────────────────────────────────────
    var options = {
      nodes: {
        borderWidth: 2,
        shadow: true,
        font: { color: "#f0f6fc", size: 13, face: "Segoe UI, Arial" },
        chosen: {
          node: function(values, id, selected) {
            values.size = values.size * 1.2;
          }
        }
      },
      edges: {
        arrows: { to: { enabled: true, scaleFactor: 0.6 } },
        color: { color: "#30363d", highlight: "#f0883e", hover: "#58a6ff" },
        font: { color: "#8b949e", size: 10, align: "middle" },
        smooth: { type: "dynamic" },
        shadow: true,
      },
      physics: {
        enabled: true,
        stabilization: { iterations: 150 },
        barnesHut: {
          gravitationalConstant: -8000,
          springLength: 140,
          springConstant: 0.04,
        },
      },
      interaction: {
        hover: true,
        tooltipDelay: 200,
        navigationButtons: false,
        keyboard: true,
      },
      layout: { randomSeed: 42 },
    };

    var container = document.getElementById("network-container");
    var network = new vis.Network(container, { nodes: nodes, edges: edges }, options);

    // Tắt physics sau khi ổn định để tránh giật
    network.on("stabilizationIterationsDone", function () {
      network.setOptions({ physics: { enabled: false } });
    });

    // Tooltip khi hover node
    network.on("hoverNode", function (params) {
      var node = nodes.get(params.node);
      container.title = node.title || node.label;
    });
  </script>
</body>
</html>
