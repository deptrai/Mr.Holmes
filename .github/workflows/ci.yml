name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # We install requirements-dev.txt which includes requirements.txt
        pip install -r requirements-dev.txt

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Treat other warnings as informational only to prevent failing on legacy formatting
        flake8 . --count --exit-zero --max-complexity=15 --max-line-length=127 --statistics

    - name: Run unit tests with pytest
      run: |
        # Run tests and generate coverage report
        # We ignore tests/proxy/test_proxy_manager.py if needed, but it should pass now
        python -m pytest tests/ -v --cov=Core --cov-report=xml --cov-report=term

    - name: Upload coverage reports to Codecov (Optional)
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false
